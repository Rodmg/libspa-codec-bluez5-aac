name: Build Deb package

permissions:
  contents: write

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:

  build-x86_64-trixie:
    runs-on: ubuntu-24.04
    container:
      image: debian:trixie-slim

    steps:
      - uses: actions/checkout@v6
      - name: Make build script executable
        run: chmod +x build.sh
      - name: Build Debian package inside Debian Trixie
        run: |
          set -eu
          ./build.sh
      - name: Upload Debian package
        uses: actions/upload-artifact@v7
        with:
          name: libspa-codec-bluez5-aac-x86_64-trixie
          path: '*.deb'

  build-arm64-trixie:
    runs-on: ubuntu-24.04-arm
    container:
      image: debian:trixie-slim

    steps:
      - uses: actions/checkout@v6
      - name: Make build script executable
        run: chmod +x build.sh
      - name: Build Debian package inside Debian Trixie
        run: |
          set -eu
          ./build.sh
      - name: Upload Debian package
        uses: actions/upload-artifact@v7
        with:
          name: libspa-codec-bluez5-aac-arm64-trixie
          path: '*.deb'

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs:
      - build-x86_64-trixie
      - build-arm64-trixie
    runs-on: ubuntu-24.04

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-artifacts

      - name: Verify and prepare release files
        run: |
          set -eu
          expected_artifacts=2
          actual_artifacts=$(find release-artifacts -mindepth 1 -maxdepth 1 -type d | wc -l)
          if [ "$actual_artifacts" -ne "$expected_artifacts" ]; then
            echo "Expected $expected_artifacts artifact directories, got $actual_artifacts"
            exit 1
          fi

          mkdir -p release
          for dir in release-artifacts/libspa-codec-bluez5-aac-*; do
            for deb in "$dir"/*.deb; do
              [ -e "$deb" ] || continue
              deb_name=$(basename "$deb" .deb)
              cp "$deb" "release/${deb_name}.deb"
            done
          done

          deb_count=$(find release -maxdepth 1 -type f -name '*.deb' | wc -l)
          if [ "$deb_count" -eq 0 ]; then
            echo "No .deb files were prepared for release"
            exit 1
          fi

          ls -la release

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v3
        with:
          files: release/*.deb
